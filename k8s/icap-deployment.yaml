# Kubernetes Deployment for ICAP with Horizontal Scaling
apiVersion: apps/v1
kind: Deployment
metadata:
  name: icap-api
  namespace: icap
  labels:
    app: icap-api
    version: v0.1.1
spec:
  replicas: 3  # Horizontal scaling - 3 replicas
  selector:
    matchLabels:
      app: icap-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: icap-api
        version: v0.1.1
    spec:
      # Anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - icap-api
                topologyKey: kubernetes.io/hostname
      
      containers:
      - name: icap-api
        image: icap-api:0.1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        
        env:
        - name: ICAP_ENVIRONMENT
          value: "production"
        - name: ICAP_VERSION
          value: "0.1.1"
        - name: ICAP_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: icap-secret
              key: database-url
        - name: ICAP_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: icap-secret
              key: secret-key
        - name: ICAP_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: icap-secret
              key: encryption-key
        - name: QDRANT_URL
          value: "http://qdrant-service:6333"
        - name: OLLAMA_URL
          value: "http://ollama-service:11434"
        - name: ICAP_RATE_LIMIT
          value: "100"
        - name: ICAP_ACCESS_TOKEN_EXPIRE
          value: "480"
        - name: ICAP_REFRESH_TOKEN_EXPIRE
          value: "7"
        
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /livez
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Startup probe
        startupProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 30
        
        volumeMounts:
        - name: audit-trail
          mountPath: /app/AuditTrail
        - name: rag-storage
          mountPath: /app/RAG
        - name: config
          mountPath: /app/.env
          subPath: .env
      
      volumes:
      - name: audit-trail
        persistentVolumeClaim:
          claimName: audit-trail-pvc
      - name: rag-storage
        persistentVolumeClaim:
          claimName: rag-storage-pvc
      - name: config
        configMap:
          name: icap-config
      
      # Node selector for GPU nodes if needed
      # nodeSelector:
      #   gpu: "true"

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: icap-api-hpa
  namespace: icap
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: icap-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
# Service for Load Balancing
apiVersion: v1
kind: Service
metadata:
  name: icap-api-service
  namespace: icap
  labels:
    app: icap-api
spec:
  type: LoadBalancer
  selector:
    app: icap-api
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8000
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: icap-api-pdb
  namespace: icap
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: icap-api

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: icap-config
  namespace: icap
data:
  .env: |
    ICAP_ENVIRONMENT=production
    ICAP_RATE_LIMIT=100
    ICAP_ACCESS_TOKEN_EXPIRE=480
    ICAP_REFRESH_TOKEN_EXPIRE=7
    QDRANT_URL=http://qdrant-service:6333
    OLLAMA_URL=http://ollama-service:11434
