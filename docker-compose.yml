version: '3.8'

services:
  icap-api:
    build: .
    image: icap-v8.9.7
    container_name: icap-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ICAP_VERSION=8.9.7
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./RAG:/app/RAG
      - ./AuditTrail:/app/AuditTrail
      # Removed ./qdrant_db volume to prevent file locks (communication via API)
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/livez"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
    networks:
      - icap-network

  qdrant:
    image: qdrant/qdrant:v1.10.1 # Pinned version
    container_name: icap-qdrant
    restart: unless-stopped
    # Ports removed for security (only internal access)
    volumes:
      - ./qdrant_db:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/v1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    networks:
      - icap-network

  # Опционално: Ollama ако се ползва контейнерна версия
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: icap-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ./ollama_data:/root/.ollama
  #   networks:
  #     - icap-network

networks:
  icap-network:
    driver: bridge
