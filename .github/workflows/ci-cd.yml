name: ICAP CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Validate versioning policy
        run: |
          python scripts/validate_versioning.py

      - name: Run tests with coverage
        run: |
          # Използваме -c /dev/null за да игнорираме pytest.ini ако прави проблеми локално,
          # но тук искаме да тестваме с него. Ако не, подаваме аргументите директно.
          PYTHONPATH=. pytest tests/test_api.py --cov=app --cov=irm_api --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit Security Scan
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]
          bandit -r . -f json -o bandit-report.json --exclude ./tests --skip B101,B601
        continue-on-error: true

      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: bandit-report.json
        continue-on-error: true
