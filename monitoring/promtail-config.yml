server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: icap-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: icap
          env: production
    pipeline_stages:
      - json:
          expressions:
            timestamp: time
            level: level
            message: message
      - labels:
          level:
      - timestamp:
          source: timestamp
          format: RFC3339
      - output:
          source: message

  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_label: __meta_docker_container_name
        regex: (.+)
        target_label: container
      - source_label: __meta_docker_container_log_stream
        regex: (.+)
        target_label: stream
    pipeline_stages:
      - docker: {}
      - labels:
          container:
          stream:
