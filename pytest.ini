[pytest]
# Pytest configuration for ICAP Platform
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage settings for ICAP Platform
# addopts е премахнат за да се избегнат конфликти в CI
# addopts = --verbose --cov=. --cov-report=xml:coverage.xml --cov-fail-under=80

# Ignore specific directories/files
ignore = 
    .git
    __pycache__
    .pytest_cache
    htmlcov
    AuditTrail
    RAG
    venv
    env
    .venv

# Markers for categorizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    vision: Vision AI tests
    color: Color engine tests
    rag: RAG system tests
    iot: IoT connector tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
