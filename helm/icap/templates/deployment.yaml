apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "icap.fullname" . }}
  labels:
    {{- include "icap.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "icap.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "icap.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "icap.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: icap
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        env:
        - name: ICAP_ENVIRONMENT
          value: {{ .Values.env.ICAP_ENVIRONMENT | quote }}
        - name: ICAP_VERSION
          value: {{ .Values.env.ICAP_VERSION | quote }}
        - name: ICAP_EDGE_MODE
          value: {{ .Values.env.ICAP_EDGE_MODE | quote }}
        - name: ICAP_ENABLE_TRACING
          value: {{ .Values.env.ICAP_ENABLE_TRACING | quote }}
        {{- if .Values.postgresql.enabled }}
        - name: ICAP_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.existingSecret | default (include "icap.fullname" .) }}
              key: database-url
        {{- end }}
        {{- if .Values.redis.enabled }}
        - name: REDIS_HOST
          value: {{ .Values.redis.host | quote }}
        - name: REDIS_PORT
          value: {{ .Values.redis.port | quote }}
        {{- end }}
        {{- if .Values.qdrant.enabled }}
        - name: QDRANT_URL
          value: "http://{{ .Values.qdrant.host }}:{{ .Values.qdrant.port }}"
        {{- end }}
        {{- if .Values.ollama.enabled }}
        - name: OLLAMA_URL
          value: "http://{{ .Values.ollama.host }}:{{ .Values.ollama.port }}/api/generate"
        - name: OLLAMA_MODEL
          value: {{ .Values.ollama.model | quote }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /livez
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: data
          mountPath: /app/RAG
        - name: audit
          mountPath: /app/AuditTrail
        {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "icap.fullname" . }}-data
      - name: audit
        persistentVolumeClaim:
          claimName: {{ include "icap.fullname" . }}-audit
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
